services:
  db:
    image: postgres:16-alpine
    container_name: academy-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: academy_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - academy-platform-db-data:/var/lib/postgresql/data

volumes:
  academy-platform-db-data:
